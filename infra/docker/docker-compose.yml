name: contexto-fc

services:
  postgres:
    image: postgres:16-alpine
    container_name: contexto-fc-postgres
    environment:
      POSTGRES_DB: contexto_fc
      POSTGRES_USER: contexto_fc
      POSTGRES_PASSWORD: contexto_fc
    ports:
      - "54329:5432"
    volumes:
      - contexto-fc-postgres:/var/lib/postgresql/data
      - ../../:/workspace:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contexto_fc -d contexto_fc"]
      interval: 5s
      timeout: 5s
      retries: 10

  directus:
    image: directus/directus:11.17.1
    container_name: contexto-fc-directus
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KEY: contexto-fc-directus-local-key
      SECRET: contexto-fc-directus-local-secret
      ADMIN_EMAIL: admin@contextofc.dev
      ADMIN_PASSWORD: directus-local-admin
      PUBLIC_URL: http://127.0.0.1:8055
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: contexto_fc
      DB_USER: directus_app
      DB_PASSWORD: directus_app
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"
    ports:
      - "8055:8055"
    volumes:
      - directus-uploads:/directus/uploads
      - directus-extensions:/directus/extensions

volumes:
  contexto-fc-postgres:
  directus-uploads:
  directus-extensions:
